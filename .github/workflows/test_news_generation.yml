name: 测试新闻生成

on:
  workflow_dispatch:  # 手动触发

jobs:
  test-news-generation:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 显示当前文件
      run: |
        echo "=== 当前目录文件 ==="
        ls -la
        echo "=== 检查Python文件 ==="
        ls -la *.py | grep news

    - name: 生成改进版新闻
      run: |
        echo "=== 运行改进版新闻生成器 ==="
        python improved_news_generator.py
        echo "=== 生成结果 ==="
        ls -la improved_financial_news_*.txt

    - name: 检查生成的内容
      run: |
        echo "=== 检查生成的文件内容 ==="
        if [ -f improved_financial_news_*.txt ]; then
          echo "=== 文件前20行 ==="
          head -20 improved_financial_news_*.txt
          echo "=== 检查是否包含概括性内容 ==="
          grep -c "2026-04-09.*投资分析显示" improved_financial_news_*.txt || echo "未找到概括性内容"
        else
          echo "❌ 未找到改进版新闻文件"
          ls -la *.txt
        fi

    - name: 发送测试邮件
      env:
        EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
        EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
        EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
        EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      run: |
        echo "=== 发送测试邮件 ==="
        python real_email_sender.py

    - name: 保存调试信息
      uses: actions/upload-artifact@v4
      with:
        name: debug-info-${{ github.run_id }}
        path: |
          improved_financial_news_*.txt
          requirements.txt
          *.py