name: 金融快报邮件发送

on:
  schedule:
    # 北京时间9:00 (UTC+8) 对应 UTC时间1:00
    - cron: '0 1 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  generate-and-send-news:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Python环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        # 如果需要额外的依赖包，在此安装
        # pip install requests

    - name: 生成金融快报
      run: |
        python financial_news_generator.py
      env:
        TZ: Asia/Shanghai

    - name: 发送邮件
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.qq.com
        server_port: 465
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "【今日金融快报】$(date +'%Y-%m-%d')"
        body: |
          您好，以下为今天（$(date +'%Y-%m-%d')）的金融资讯快报，请查收。

          $(cat financial_news_$(date +'%Y-%m-%d').txt | tail -n +3)
        to: 1372943709@qq.com
        from: ${{ secrets.EMAIL_USERNAME }}
        content_type: text/plain
        charset: utf-8

    - name: 保存生成的文件
      uses: actions/upload-artifact@v3
      with:
        name: financial-news-${{ github.run_id }}
        path: financial_news_*.txt